name: Daily Release Notes

on:
  schedule:
    # Mon–Fri at 07:00 UTC
    - cron: '0 7 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: read

jobs:
  generate-daily:
    name: Generate and publish daily release notes
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: .github/scripts/package-lock.json

      - name: Install dependencies
        working-directory: .github/scripts
        run: npm ci --omit=dev 2>/dev/null || npm install

      - name: Generate daily release notes
        working-directory: .github/scripts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          SLACK_WEBHOOK_RELEASES: ${{ secrets.SLACK_WEBHOOK_RELEASES }}
          KNOWLEDGE_HUB_ENDPOINT: ${{ secrets.KNOWLEDGE_HUB_ENDPOINT }}
          KNOWLEDGE_HUB_TOKEN: ${{ secrets.KNOWLEDGE_HUB_TOKEN }}
        run: node generate-daily.js
