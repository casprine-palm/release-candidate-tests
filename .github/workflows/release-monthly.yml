name: Monthly Release Notes

on:
  schedule:
    # First Monday of each month at 07:00 UTC
    # Runs on days 1-7 that fall on a Monday
    - cron: '0 7 1-7 * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  generate-monthly:
    name: Generate and publish monthly marketing summary
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: .github/scripts/package-lock.json

      - name: Install dependencies
        working-directory: .github/scripts
        run: npm ci --omit=dev 2>/dev/null || npm install

      - name: Generate monthly summary
        working-directory: .github/scripts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_WEBHOOK_RELEASES: ${{ secrets.SLACK_WEBHOOK_RELEASES }}
        run: node generate-monthly.js
