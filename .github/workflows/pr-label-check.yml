name: PR Label Check

on:
  pull_request:
    types: [opened, labeled, unlabeled, synchronize, reopened]

permissions:
  pull-requests: write
  contents: read

jobs:
  check-labels:
    name: Verify PR labels
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login != 'dependabot[bot]'
    steps:
      - name: Check required labels
        uses: actions/github-script@v7
        with:
          script: |
            const labels = context.payload.pull_request.labels.map(l => l.name);
            const body_text = context.payload.pull_request.body || '';
            const pr = context.payload.pull_request.number;

            const scopeLabels = labels.filter(l => l.startsWith('scope:'));
            const changeLabels = labels.filter(l => l.startsWith('change:'));

            const hasRelease   = labels.includes('change:release');
            const hasReleaseFf = labels.includes('change:release-ff');

            // --- Body section validators ---
            // Splits body into sections and returns the text content under a given heading
            function sectionContent(heading) {
              const lines = body_text.split('\n');
              let inSection = false;
              const content = [];
              for (const line of lines) {
                if (/^##\s+/i.test(line)) {
                  if (inSection) break;
                  if (line.replace(/^##\s+/i, '').trim().toLowerCase() === heading.toLowerCase()) {
                    inSection = true;
                    continue;
                  }
                }
                if (inSection) content.push(line);
              }
              return content.join('\n').replace(/<!--[\s\S]*?-->/g, '').trim();
            }

            const errors = [];

            // Label checks
            if (scopeLabels.length === 0) {
              errors.push('❌ **Missing scope label** — add at least one of: `scope:fe`, `scope:be`, `scope:ml`, `scope:data`');
            }
            if (changeLabels.length === 0) {
              errors.push('❌ **Missing change type label** — add at least one of: `change:feat`, `change:fix`, `change:perf`, `change:breaking`, `change:refactor`, `change:chore`, `change:docs`, `change:release`, `change:release-ff`');
            }
            if (hasRelease && hasReleaseFf) {
              errors.push('❌ **Conflicting release labels** — use `change:release` for fully live changes or `change:release-ff` for changes behind a feature flag, not both.');
            }

            // Body checks
            if (!sectionContent('Outcome')) {
              errors.push('❌ **Outcome is required** — describe the user-facing or system impact in the `## Outcome` section');
            }

            if (errors.length > 0) {
              // Post or update a comment
              const marker = '<!-- pr-label-check -->';
              const body = [
                marker,
                '## PR Check Failed',
                '',
                errors.join('\n'),
                '',
                '---',
                '**Required:**',
                '- At least one `scope:` label and one `change:` label',
                '- `## Outcome` — what changed for users or the system',
              ].join('\n');

              // Find existing bot comment
              const comments = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr,
              });

              const existing = comments.data.find(c => c.body.includes(marker));
              if (existing) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existing.id,
                  body,
                });
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: pr,
                  body,
                });
              }

              core.setFailed(`Label check failed:\n${errors.join('\n')}`);
            } else {
              // Clean up any existing failure comment
              const comments = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr,
              });

              const marker = '<!-- pr-label-check -->';
              const existing = comments.data.find(c => c.body.includes(marker));
              if (existing) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existing.id,
                });
              }

              console.log('  PR check passed');
              console.log(`  Scope labels:  ${scopeLabels.join(', ')}`);
              console.log(`  Change labels: ${changeLabels.join(', ')}`);
              console.log('  Outcome:       ✓');
            }
